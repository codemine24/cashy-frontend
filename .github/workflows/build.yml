name: Build Android AAB
on:
  push:
    branches:
      - main
  workflow_dispatch: # Still allows you to run it manually if needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build AAB Locally on GitHub
        run: npx eas-cli build -p android --profile production --local --non-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: ./*.aab
